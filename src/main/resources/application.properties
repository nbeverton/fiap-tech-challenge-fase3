############################################
# Application
############################################

spring.application.name=TechChallenge3.G29


############################################
# MongoDB Configuration
############################################

# Automatically create MongoDB indexes defined in the domain
spring.data.mongodb.auto-index-creation=true

# Base URL for the external payment processor used to submit and query payments
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27018/techchallenge}

############################################
# Security (JWT)
############################################

# Base64-encoded secret used for HS256 JWT signing.
# Must decode to at least 32 bytes (256 bits).
# Replace fallback value and use environment variable in production.
security.jwt.secret=${JWT_SECRET_BASE64:wE5aP9xM8vKZbS4j8Q7mN2tYkP3rA1xCqWvL9uT0gHk=}

############################################
# Spring Profiles
############################################

# Active Spring profile (recommended for multi-environment setups)
# spring.profiles.active=${SPRING_PROFILES_ACTIVE}

############################################
# Spring Boot Actuator (Health & Monitoring)
############################################

# Expose health endpoint
# management.endpoints.web.exposure.include=health

# Show health details
# management.endpoint.health.show-details=always


############################################
# Spring Context Configuration
############################################

# Allows bean overriding (useful in tests and modular configurations)
spring.main.allow-bean-definition-overriding=true

############################################
# Logging & Debug
############################################

# Enable full debug mode
# debug=true

# Root logging level
# logging.level.root=DEBUG

# Spring Web logging
logging.level.org.springframework.web=DEBUG

# Request/response logging filter
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# Log request details (headers, parameters, payload)
spring.mvc.log-request-details=true

############################################
# External Payment
############################################

# Base URL do simulador (env; fallback local)
external.payment.base-url=${EXTERNAL_PAYMENT_BASE_URL:http://localhost:8089}

# Interval for payment reprocessing (in milliseconds)
# 30000ms = 30 seconds
payment.reprocessing.fixed-delay-ms=30000

############################################
# Kafka
############################################

# Kafka bootstrap servers
# In Docker Compose, the app container reaches Kafka by service name
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

############################################
# Kafka - Consumer
############################################

# Default consumer group for local development
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:techchallenge-payment-group}

# Start reading from the beginning when no offset is committed yet
spring.kafka.consumer.auto-offset-reset=earliest

# Basic serializers/deserializers for initial setup
# We will evolve to JSON event payloads in the next step
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

############################################
# Kafka - Topics
############################################

# Order created event
app.kafka.topic.order-created=pedido.criado

# Payment approved event
app.kafka.topic.payment-approved=pagamento.aprovado

# Payment pending event
app.kafka.topic.payment-pending=pagamento.pendente

############################################
# Resilience4j
############################################

resilience4j.circuitbreaker.instances.externalPaymentProcessor.register-health-indicator=true
resilience4j.circuitbreaker.instances.externalPaymentProcessor.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.externalPaymentProcessor.sliding-window-size=5
resilience4j.circuitbreaker.instances.externalPaymentProcessor.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.externalPaymentProcessor.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.externalPaymentProcessor.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.externalPaymentProcessor.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.externalPaymentProcessor.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.timelimiter.instances.externalPaymentProcessor.timeout-duration=3s
resilience4j.timelimiter.instances.externalPaymentProcessor.cancel-running-future=true

############################################
# Trash
############################################

# MongoDB URI (recommended for Docker / CI environments)
# spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

# Local MongoDB configuration
# Used to allow local execution on macOS without Docker-related issues
# spring.data.mongodb.uri=mongodb://localhost:27018/techchallenge

# If you want to run locally WITHOUT Docker:
# 1) Comment the URI above
# 2) Uncomment the URI below
# 3) Run the following command to start MongoDB only:
#    docker compose -f docker-compose-mongo.yml up
