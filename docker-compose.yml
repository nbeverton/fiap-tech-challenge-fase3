version: "3.9"

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: techchallenge
    ports:
      - "27018:27017"   # host:container (só pra você debugar)
    networks:
      - fiap-network
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  # Spring Boot App
  app:
    build: .
    container_name: fiap-tech-challenge-fase3
    ports:
      - "8081:8080"
    networks:
      - fiap-network
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/techchallenge?retryWrites=true&serverSelectionTimeoutMS=5000&connectTimeoutMS=5000
      JWT_SECRET_BASE64: wE5aP9xM8vKZbS4j8Q7mN2tYkP3rA1xCqWvL9uT0gHk=
      EXTERNAL_PAYMENT_BASE_URL: http://host.docker.internal:8089
    # ✅ remove healthcheck pra não depender de curl dentro do container
    # healthcheck: ...

networks:
  fiap-network:
    driver: bridge

volumes:
  mongodb_data:


